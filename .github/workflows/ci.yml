name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Python 3.12
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile source and examples
        run: python -m compileall -q src examples

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m pyright src

      - name: Run tests
        run: python -m pytest -q

      - name: Build distribution
        run: |
          rm -rf dist build
          python -m build
          python -m twine check dist/*
          python - <<'PY'
          import tarfile
          from pathlib import Path

          sdist = next(Path("dist").glob("*.tar.gz"))
          with tarfile.open(sdist) as archive:
              names = archive.getnames()
          leaked_tests = [name for name in names if "/tests/" in name or name.endswith("/tests")]
          if leaked_tests:
              raise SystemExit(f"sdist should not contain tests: {leaked_tests[:5]}")
          PY

      - name: Run E2E smoke tests
        run: PYTHONPATH=src python -m pytest tests/e2e -q

      - name: Certification report
        run: PYTHONPATH=src python -m agent_runtime.cli.main certify run --subject all

      - name: Adapter replay
        run: PYTHONPATH=src python -m agent_runtime.cli.main adapter replay --scenario code-ci --adapter openai --adapter langgraph --adapter codex

      - name: Sandbox conformance
        run: |
          PYTHONPATH=src python -m agent_runtime.cli.main sandbox conformance --backend container --dry-run
          PYTHONPATH=src python -m agent_runtime.cli.main sandbox conformance --backend docker --dry-run
          PYTHONPATH=src python -m agent_runtime.cli.main sandbox conformance --backend sidecar --dry-run
          PYTHONPATH=src python -m agent_runtime.cli.main sandbox conformance --backend remote --dry-run
